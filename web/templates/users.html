<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 凯伦</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    (function() {
      const theme = localStorage.getItem("theme") || "system";
      if (theme === "system") {
        const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        document.documentElement.setAttribute("data-theme", prefersLight ? "light" : "dark");
      } else {
        document.documentElement.setAttribute("data-theme", theme);
      }
    })();
  </script>
  <style>
    :root {
      --cfg-bg: #0a0a0f;
      --cfg-card: #16161f;
      --cfg-card-border: rgba(255,255,255,0.06);
      --cfg-text: #e8e8f0;
      --cfg-text2: #9ca3af;
      --cfg-text3: #6b7280;
      --cfg-accent: #00d4aa;
      --cfg-accent-h: #00b894;
      --cfg-ok: #22c55e;
      --cfg-warn: #f59e0b;
      --cfg-err: #ef4444;
      --cfg-radius: 14px;
      --cfg-radius-sm: 10px;
      --cfg-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    [data-theme="light"] {
      --cfg-bg: #f5f7fa;
      --cfg-card: #ffffff;
      --cfg-card-border: rgba(0,0,0,0.06);
      --cfg-text: #1f2937;
      --cfg-text2: #6b7280;
      --cfg-text3: #9ca3af;
      --cfg-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--cfg-bg);
      color: var(--cfg-text);
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--cfg-card-border);
      padding: 0 20px;
    }

    [data-theme="light"] .top-bar {
      background: rgba(255,255,255,0.85);
    }

    .top-bar-inner {
      max-width: 860px;
      margin: 0 auto;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .top-bar-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--cfg-text2);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 6px 12px;
      border-radius: var(--cfg-radius-sm);
      transition: all 0.2s;
    }

    .top-bar-back:hover {
      background: var(--cfg-card);
      color: var(--cfg-text);
    }

    .top-bar-title {
      font-size: 1rem;
      font-weight: 600;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .cfg-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--cfg-text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 32px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title:first-child { margin-top: 0; }
    .section-title .count { font-size: 0.8rem; color: var(--cfg-text3); font-weight: 400; }

    /* Form Card */
    .form-card {
      background: var(--cfg-card);
      border: 1px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--cfg-shadow);
    }

    .form-card.hidden { display: none; }

    .form-card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .form-close {
      background: none;
      border: none;
      color: var(--cfg-text3);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .form-close:hover { color: var(--cfg-text); }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--cfg-text2);
      margin-bottom: 6px;
    }

    .cfg-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--cfg-bg);
      border: 1.5px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius-sm);
      color: var(--cfg-text);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }

    .cfg-input:focus {
      border-color: var(--cfg-accent);
      box-shadow: 0 0 0 3px rgba(16,163,127,0.15);
    }

    .cfg-input::placeholder { color: var(--cfg-text3); }

    .btn-row { display: flex; gap: 12px; margin-top: 24px; }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: var(--cfg-radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--cfg-accent);
      color: white;
    }
    .btn-primary:hover { background: var(--cfg-accent-h); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: transparent;
      color: var(--cfg-text);
      border: 1.5px solid var(--cfg-card-border);
    }
    .btn-secondary:hover { border-color: var(--cfg-accent); color: var(--cfg-accent); }

    /* User Table */
    .user-list {
      background: var(--cfg-card);
      border: 1.5px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius);
      overflow: hidden;
    }

    .user-list-header {
      display: grid;
      grid-template-columns: 80px 1fr 80px 140px 100px;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(128,128,128,0.05);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--cfg-text3);
      border-bottom: 1px solid var(--cfg-card-border);
    }

    .user-item {
      display: grid;
      grid-template-columns: 80px 1fr 80px 140px 100px;
      gap: 12px;
      padding: 12px 16px;
      align-items: center;
      border-bottom: 1px solid rgba(128,128,128,0.08);
      font-size: 0.85rem;
      color: var(--cfg-text);
    }

    .user-item:last-child { border-bottom: none; }

    .user-id { font-family: monospace; font-size: 0.8rem; color: var(--cfg-text3); }

    .user-role {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .user-role.admin {
      background: rgba(239,68,68,0.12);
      color: var(--cfg-err);
    }

    .user-role.user {
      background: rgba(34,197,94,0.12);
      color: var(--cfg-ok);
    }

    .user-actions {
      display: flex;
      gap: 8px;
    }

    .user-btn {
      padding: 5px 10px;
      border: 1px solid var(--cfg-card-border);
      border-radius: 6px;
      background: transparent;
      color: var(--cfg-text2);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .user-btn:hover { border-color: var(--cfg-accent); color: var(--cfg-accent); }

    .user-btn.danger:hover { border-color: var(--cfg-err); color: var(--cfg-err); }

    .user-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--cfg-text3);
      font-size: 0.85rem;
    }

    /* Add User Button */
    .add-user-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    .add-user-btn {
      padding: 8px 16px;
      border: 1.5px solid var(--cfg-accent);
      border-radius: var(--cfg-radius-sm);
      background: transparent;
      color: var(--cfg-accent);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .add-user-btn:hover { background: rgba(16,163,127,0.08); }

    /* Toast */
    .toast {
      position: fixed;
      top: 68px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      padding: 12px 24px;
      border-radius: var(--cfg-radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      color: white;
      z-index: 10000;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      box-shadow: var(--cfg-shadow);
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.ok { background: var(--cfg-ok); }
    .toast.err { background: var(--cfg-err); }
    .toast.info { background: #3b82f6; }

    @media (max-width: 600px) {
      .user-list-header { display: none; }
      .user-item {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 14px 16px;
      }
      .top-bar-title { display: none; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-inner">
      <a href="/" class="top-bar-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        返回聊天
      </a>
      <span class="top-bar-title">用户管理</span>
      <div style="width: 80px;"></div>
    </div>
  </div>

  <main class="cfg-main">
    <!-- Add User Form -->
    <div class="form-card hidden" id="addUserForm">
      <div class="form-card-title">
        <span>新建用户</span>
        <button class="form-close" id="formClose">&times;</button>
      </div>
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" class="cfg-input" id="userName" placeholder="例如：张三">
      </div>
      <div class="form-group">
        <label class="form-label">API Key</label>
        <input type="text" class="cfg-input" id="userApiKey" placeholder="用户登录用的 API Key">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="cfg-input" id="userPassword" placeholder="设置登录密码（可选）">
      </div>
      <div class="form-group">
        <label class="form-label">角色</label>
        <select class="cfg-input" id="userRole">
          <option value="user">普通用户</option>
          <option value="admin">管理员</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="createBtn">创建用户</button>
      </div>
    </div>

    <!-- User List -->
    <div class="section-title">
      <span>用户列表</span>
      <span class="count" id="userCount"></span>
    </div>

    <div class="add-user-bar">
      <button class="add-user-btn" id="showAddFormBtn">+ 新建用户</button>
    </div>

    <div class="user-list" id="userList">
      <div class="user-list-header">
        <span>ID</span>
        <span>用户名</span>
        <span>角色</span>
        <span>创建时间</span>
        <span>操作</span>
      </div>
      <div class="user-empty" id="userEmpty">暂无用户</div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const userList = document.getElementById("userList");
    const userEmpty = document.getElementById("userEmpty");
    const addUserForm = document.getElementById("addUserForm");

    document.getElementById("showAddFormBtn").addEventListener("click", () => {
      addUserForm.classList.remove("hidden");
      addUserForm.scrollIntoView({ behavior: "smooth", block: "center" });
    });

    document.getElementById("formClose").addEventListener("click", hideForm);
    document.getElementById("cancelBtn").addEventListener("click", hideForm);

    function hideForm() {
      addUserForm.classList.add("hidden");
      document.getElementById("userName").value = "";
      document.getElementById("userApiKey").value = "";
      document.getElementById("userPassword").value = "";
      document.getElementById("userRole").value = "user";
    }

    async function loadUsers() {
      try {
        const resp = await fetch("/api/auth/users");
        if (resp.status === 403) {
          showToast("需要管理员权限", true);
          return;
        }
        const data = await resp.json();
        if (data.success) {
          const users = data.users || [];
          document.getElementById("userCount").textContent = `共 ${users.length} 人`;
          renderUsers(users);
        }
      } catch (e) {
        showToast("加载用户列表失败", true);
      }
    }

    function renderUsers(users) {
      userList.querySelectorAll(".user-item").forEach(el => el.remove());

      if (users.length === 0) {
        userEmpty.style.display = "block";
        return;
      }
      userEmpty.style.display = "none";

      users.forEach(u => {
        const item = document.createElement("div");
        item.className = "user-item";
        const date = u.created_at ? new Date(u.created_at * 1000).toLocaleString("zh-CN") : "-";
        const roleClass = u.role === "admin" ? "admin" : "user";
        const roleText = u.role === "admin" ? "管理员" : "用户";
        item.innerHTML = `
          <span class="user-id">${escapeHtml(u.id)}</span>
          <span>${escapeHtml(u.name)}</span>
          <span><span class="user-role ${roleClass}">${roleText}</span></span>
          <span style="color:var(--cfg-text3);font-size:0.8rem;">${date}</span>
          <span class="user-actions">
            <button class="user-btn danger" data-id="${escapeHtml(u.id)}" data-name="${escapeHtml(u.name)}">删除</button>
          </span>
        `;
        item.querySelector(".user-btn").addEventListener("click", () => deleteUser(u.id, u.name));
        userList.appendChild(item);
      });
    }

    async function deleteUser(userId, userName) {
      if (!confirm(`确定要删除用户 "${userName}" (${userId}) 吗？此操作不可撤销。`)) return;
      try {
        const resp = await fetch(`/api/auth/users/${encodeURIComponent(userId)}`, { method: "DELETE" });
        const data = await resp.json();
        if (data.success) {
          showToast("用户已删除");
          loadUsers();
        } else {
          showToast(data.message || "删除失败", true);
        }
      } catch (e) {
        showToast("删除失败", true);
      }
    }

    document.getElementById("createBtn").addEventListener("click", async () => {
      const name = document.getElementById("userName").value.trim();
      const apiKey = document.getElementById("userApiKey").value.trim();
      const password = document.getElementById("userPassword").value.trim();
      const role = document.getElementById("userRole").value;

      if (!name) { showToast("请填写用户名", true); return; }
      if (!apiKey) { showToast("请填写 API Key", true); return; }

      try {
        const resp = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, apiKey, role, password })
        });
        const data = await resp.json();
        if (data.success) {
          showToast("用户创建成功");
          hideForm();
          loadUsers();
        } else {
          showToast(data.message || "创建失败", true);
        }
      } catch (e) {
        showToast("创建失败", true);
      }
    });

    function showToast(message, isError = false) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast " + (isError ? "err" : "ok");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    loadUsers();
  </script>
</body>
</html>
