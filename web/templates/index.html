<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=99">
  <script>
    (function() {
      const theme = localStorage.getItem("theme") || "system";
      if (theme === "system") {
        const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        document.documentElement.setAttribute("data-theme", prefersLight ? "light" : "dark");
      } else {
        document.documentElement.setAttribute("data-theme", theme);
      }
    })();
  </script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-logo">凯伦</div>
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          新建对话
        </button>
      </div>

      <div class="sidebar-history" id="sidebarHistory">
        <!-- 动态生成历史对话列表 -->
      </div>

      <div class="sidebar-footer">
        <button class="sidebar-item" id="extensionsBtn" title="扩展与管理">
          <span class="sidebar-icon">🧩</span>
          <span class="sidebar-text">管理</span>
        </button>
        <button class="sidebar-item" id="themeToggleBtn" title="切换主题">
          <span class="sidebar-icon" id="themeIcon">💻</span>
          <span class="sidebar-text">主题</span>
        </button>
        <div class="sidebar-item" id="modelSwitcherBtn" style="cursor: pointer;" title="点击切换模型">
          <span class="sidebar-icon">🤖</span>
          <span class="sidebar-text" id="currentModelText">加载中...</span>
        </div>
      </div>
    </aside>

    <!-- Mobile toggle -->
    <button class="sidebar-toggle" id="sidebarToggle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
      <div class="chat-main" id="chatMain">
        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
          <div class="empty-content">
            <h1 class="empty-title">我是凯伦，你想问什么？</h1>
          </div>
        </div>

        <!-- Messages Area -->
        <div class="messages" id="chatMessages" style="display: none;"></div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <div class="input-box">
            <div class="input-tools">
              <button class="tool-btn with-label" id="uploadBtn" title="上传文件">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span class="tool-label">上传</span>
              </button>
              <input type="file" id="fileInput" style="display: none;" accept=".pdf,.docx,.doc,.txt,.md,.py,.js,.html,.css,.json,.xml,.yaml,.yml">
            </div>
            <div class="file-attachment" id="fileAttachment" style="display: none;">
              <span class="file-attachment-icon">📎</span>
              <span class="file-attachment-name" id="fileAttachmentName"></span>
              <button class="file-attachment-remove" id="fileAttachmentRemove" title="移除文件"></button>
            </div>
            <textarea
              class="chat-input"
              id="chatInput"
              placeholder="发送消息..."
              rows="1"
              oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" id="sendBtn" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
            <button class="stop-btn" id="stopBtn" style="display: none;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="6" width="12" height="12" rx="2"></rect>
              </svg>
            </button>
          </div>
          <div class="review-bar" id="reviewBar" style="display: none;">
            <span class="review-bar-text">回答已生成，需要审查吗？</span>
            <button class="review-bar-btn" id="reviewBarBtn">🔍 审查回答</button>
          </div>
          <div class="input-hint" id="inputHint">
            <span id="modelHint">加载中...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Preview Panel (right side) -->
    <aside class="preview-panel" id="previewPanel">
      <div class="preview-panel-header">
        <span>&#127760; 代码预览</span>
        <div class="preview-panel-actions">
          <button class="preview-panel-dl" id="previewPanelDl" title="下载 HTML">&#128190; 下载</button>
          <button class="preview-panel-close" id="previewPanelClose">&#10005;</button>
        </div>
      </div>
      <div class="preview-panel-frame-wrap">
        <iframe id="previewFrame" sandbox="allow-scripts" referrerpolicy="no-referrer"></iframe>
      </div>
    </aside>
  </div>

  <!-- Model Switcher Modal -->
  <div class="model-switcher-overlay" id="modelSwitcherOverlay" style="display: none;">
    <div class="model-switcher-box">
      <div class="model-switcher-header">
        <span class="model-switcher-title">&#128268; 切换模型</span>
        <button class="model-switcher-close" id="modelSwitcherClose">&#10005;</button>
      </div>
      <div class="model-switcher-list" id="modelSwitcherList">
        <!-- Config items rendered here -->
      </div>
      <a href="/config" class="model-switcher-manage">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"></path>
        </svg>
        管理模型配置
      </a>
    </div>
  </div>

  <!-- User Config Dialog (for LAN guests to set their own API Key) -->
  <div class="config-prompt-overlay" id="userConfigOverlay" style="display: none;">
    <div class="config-prompt-box" style="max-width: 420px; text-align: left;">
      <div style="text-align: center; margin-bottom: 20px;">
        <div class="config-prompt-icon">&#9881;&#65039;</div>
        <div class="config-prompt-title">配置你的 AI 模型</div>
        <div class="config-prompt-desc">输入你自己的 API Key，数据仅保存在当前浏览器</div>
      </div>
      <div class="user-cfg-form">
        <div class="user-cfg-group">
          <label class="user-cfg-label">提供商</label>
          <select class="user-cfg-select" id="userCfgProvider">
            <option value="deepseek">DeepSeek</option>
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="gemini">Google Gemini</option>
            <option value="qwen">阿里 Qwen</option>
            <option value="kimi">月之暗面 Kimi</option>
            <option value="glm">智谱 GLM</option>
            <option value="ollama">Ollama (本地)</option>
            <option value="grok">xAI Grok</option>
            <option value="mistral">Mistral AI</option>
            <option value="groq">Groq</option>
            <option value="azure">Azure OpenAI</option>
          </select>
        </div>
        <div class="user-cfg-group">
          <label class="user-cfg-label">模型名称</label>
          <input type="text" class="user-cfg-input" id="userCfgModel" placeholder="例如：deepseek-chat">
          <div class="user-cfg-hint" id="userCfgModelHint">&#128161; 常见模型：deepseek-chat, gpt-4o, claude-sonnet-4</div>
        </div>
        <div class="user-cfg-group">
          <label class="user-cfg-label">API Key</label>
          <div style="position: relative;">
            <input type="password" class="user-cfg-input" id="userCfgApiKey" placeholder="输入你的 API Key">
            <button class="user-cfg-toggle" id="userCfgToggleKey" type="button">&#128065;</button>
          </div>
          <div class="user-cfg-hint" id="userCfgKeyHint">&#128272; 仅保存在本地浏览器，不会上传到服务器</div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button class="config-prompt-btn secondary" id="userCfgCancel" style="flex: 1;">取消</button>
          <button class="config-prompt-btn primary" id="userCfgSave" style="flex: 1;">&#128190; 保存并开始</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Extensions Panel -->
  <div class="config-prompt-overlay" id="extensionsOverlay" style="display: none;">
    <div class="config-prompt-box" style="max-width: 520px; text-align: left; max-height: 80vh; overflow-y: auto;">
      <div style="text-align: center; margin-bottom: 20px;">
        <div class="config-prompt-icon">🧩</div>
        <div class="config-prompt-title">扩展功能</div>
      </div>
      <div id="extensionsContent">
        <div style="text-align:center; color: var(--text-secondary);">加载中...</div>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="config-prompt-btn secondary" id="extensionsClose" style="flex: 1;">关闭</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}?v=16"></script>
</body>
</html>
